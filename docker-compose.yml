version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://verdechain:verdechain@db:5432/verdechain
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: verdechain
      POSTGRES_PASSWORD: verdechain
      POSTGRES_DB: verdechain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdechain"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
